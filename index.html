<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>My Showcase Website</title>
</head>
<!-- This is the main body of the website- ALL your content goes AFTER the <body> tag and before the </body> tag -->
<body>

    <!-- The Hero Section -------------------------------------------------------------------------------------- -->
    <section class="hero">
        <div class="hero-text">Ben's Y10 Showcase Website</div>
    </section>

<!-- Topic one ------------------------------------------------------------------------------------------------- -->
    <!-- The First Topic Section -->
    <section class="topic">
        <!-- the topic title a big bar with text in it -->
        <div class="topic-title">
            <h1>Image creation</h1>
        </div>
        <!-- now a three column grid of images -->
        <div class="topic-content">
            <!-- one "card" which includes an image with a text below it -->
            <div class="topic-card">
                <img src="images/slippry-the-seal.png" alt="seal">
                <h2 class="topic-card-text">Seal drawing</h2>
            </div>
            <div class="topic-card">
                <img src="images/pixal-art-copy.jpg" alt="A tree">
                <h2 class="topic-card-text">pixal art of a tree</h2>
            </div>
            <div class="topic-card">
                <img src="images/football.svg" alt="a football">
                <h2 class="topic-card-text">A foootball</h2>
            </div>
        </div>
    </section>
<!-- End of topic one------------------------------------------------------------------------------------------ -->

<!-- Copy and paste the section from above to make your next section -->



    <!-- A Simple Website Footer ------------------------------------------------------------------------------ -->
    <footer class="footer">
        <p>&copy; 2026 My Showcase Website by Ben Ellis</p>
    </footer>

<!-- The end of the whole page- no more content after this! -->
</body>
</html>
